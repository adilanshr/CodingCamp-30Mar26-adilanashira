<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="warning-banner" class="warning-banner hidden" role="alert"></div>

    <header>
      <div class="header-top">
        <h1>Expense &amp; Budget Visualizer</h1>
        <button id="theme-toggle" class="btn-theme" aria-label="Toggle dark/light mode">🌙 Dark Mode</button>
      </div>
      <div class="balance-card">
        <span class="balance-label">Total Spent</span>
        <span id="balance" class="balance-amount">$0.00</span>
      </div>
    </header>

    <main>
      <section class="form-section" aria-labelledby="form-heading">
        <h2 id="form-heading">Add Transaction</h2>
        <form id="expense-form" novalidate>
          <div class="field-group">
            <label for="item-name">Item Name</label>
            <input type="text" id="item-name" name="itemName" placeholder="e.g. Coffee" autocomplete="off" />
            <span class="field-error" id="item-name-error" aria-live="polite"></span>
          </div>

          <div class="field-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" name="amount" min="0.01" step="0.01" placeholder="0.00" />
            <span class="field-error" id="amount-error" aria-live="polite"></span>
          </div>

          <div class="field-group">
            <label for="category">Category</label>
            <select id="category" name="category">
              <option value="">-- Select category --</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
            <span class="field-error" id="category-error" aria-live="polite"></span>
          </div>

          <button type="submit" class="btn-add">Add Transaction</button>
        </form>

        <details class="custom-category-panel">
          <summary>+ Add custom category</summary>
          <div class="custom-category-form">
            <input type="text" id="new-category-input" placeholder="e.g. Health" maxlength="30" />
            <button type="button" id="add-category-btn" class="btn-secondary">Add</button>
          </div>
          <span class="field-error" id="new-category-error" aria-live="polite"></span>
        </details>
      </section>

      <section class="list-section" aria-labelledby="list-heading">
        <div class="list-header">
          <h2 id="list-heading">Transactions</h2>
          <div class="sort-control">
            <label for="sort-select" class="sr-only">Sort by</label>
            <select id="sort-select" aria-label="Sort transactions">
              <option value="date">Date (newest)</option>
              <option value="amount-desc">Amount (high to low)</option>
              <option value="amount-asc">Amount (low to high)</option>
              <option value="category">Category (A-Z)</option>
            </select>
          </div>
        </div>
        <ul id="transaction-list" aria-label="Transaction list">
          <li class="empty-state">No transactions recorded.</li>
        </ul>
      </section>

      <section class="chart-section" aria-labelledby="chart-heading">
        <h2 id="chart-heading">Spending by Category</h2>
        <canvas id="chart" aria-label="Spending pie chart" role="img"></canvas>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="js/app.js" type="module"></script>
  </body>
</html>
